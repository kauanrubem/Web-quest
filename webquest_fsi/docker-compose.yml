services:
  postgres:
    image: postgres:16-alpine
    container_name: webquest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: webquest_fsi
    ports:
      - "5435:5432"
    volumes:
      - webquest_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d webquest_fsi"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: webquest-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3001
      ADMIN_SECRET: monitor-fsi-local
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: webquest_fsi
    ports:
      - "3001:3001"
    volumes:
      - ./:/app
      - api_node_modules:/app/node_modules

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: webquest-frontend
    restart: unless-stopped
    depends_on:
      - api
    environment:
      VITE_API_PROXY_TARGET: http://api:3001
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./:/app
      - frontend_node_modules:/app/node_modules

volumes:
  webquest_postgres_data:
  api_node_modules:
  frontend_node_modules:
