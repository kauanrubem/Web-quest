services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PGUSER:-postgres}
      POSTGRES_PASSWORD: ${PGPASSWORD:-troque-esta-senha}
      POSTGRES_DB: ${PGDATABASE:-webquest_fsi}
    volumes:
      - webquest_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-postgres} -d ${PGDATABASE:-webquest_fsi}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile.api.prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3001
      ADMIN_SECRET: ${ADMIN_SECRET:-troque-esta-chave}
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${PGUSER:-postgres}
      PGPASSWORD: ${PGPASSWORD:-troque-esta-senha}
      PGDATABASE: ${PGDATABASE:-webquest_fsi}
    expose:
      - "3001"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.prod
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  webquest_postgres_data:
